name: Publish Ruby Gem

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Publish to RubyGems
        uses: rubygems/release-gem@v1

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gem build puma-plugin-delayed_stop.gemspec
          gh release create "${{ github.ref_name }}" *.gem --generate-notes
